<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart 生鲜超市</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <h1>FreshMart</h1>
                    <p>你的日常生鲜伙伴</p>
                </div>
                <nav class="nav">
                    <a href="#products">全部商品</a>
                    <a href="#cart" class="cart-link">购物车 (<span id="cart-count">0</span>)</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- 主横幅 -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h2>新鲜直达，安心选购</h2>
                <p>精选优质食材，给你和家人健康的每一天</p>
            </div>
        </div>
    </section>

    <!-- 商品列表区 -->
    <section id="products" class="products-section">
        <div class="container">
            <h2 class="section-title">热销商品</h2>
            <div class="products-grid">
                <!-- 商品1：苹果 -->
                <div class="product-card">
                    <div class="product-image">
                        <img src="苹果.png" alt="苹果">
                    </div>
                    <div class="product-info">
                        <h3>红富士苹果</h3>
                        <p class="product-desc">脆甜多汁，产地直供</p>
                        <div class="price-row">
                            <span class="price">¥5.99</span>
                            <button class="add-btn" onclick="addToCart(1)">加入购物车</button>
                        </div>
                    </div>
                </div>

                <!-- 商品2：牛奶 -->
                <div class="product-card">
                    <div class="product-image">
                        <img src="牛奶.png" alt="牛奶">
                    </div>
                    <div class="product-info">
                        <h3>全脂纯牛奶</h3>
                        <p class="product-desc">营养早餐，每日必备</p>
                        <div class="price-row">
                            <span class="price">¥12.50</span>
                            <button class="add-btn" onclick="addToCart(2)">加入购物车</button>
                        </div>
                    </div>
                </div>

                <!-- 商品3：面包 -->
                <div class="product-card">
                    <div class="product-image">
                        <img src="面包.png" alt="面包">
                    </div>
                    <div class="product-info">
                        <h3>全麦吐司面包</h3>
                        <p class="product-desc">健康粗粮，无额外添加</p>
                        <div class="price-row">
                            <span class="price">¥8.99</span>
                            <button class="add-btn" onclick="addToCart(3)">加入购物车</button>
                        </div>
                    </div>
                </div>

                <!-- 商品4：鸡蛋 -->
                <div class="product-card">
                    <div class="product-image">
                        <img src="鸡蛋.png" alt="鸡蛋">
                    </div>
                    <div class="product-info">
                        <h3>农家土鸡蛋</h3>
                        <p class="product-desc">散养鸡蛋，营养丰富</p>
                        <div class="price-row">
                            <span class="price">¥15.00</span>
                            <button class="add-btn" onclick="addToCart(4)">加入购物车</button>
                        </div>
                    </div>
                </div>

                <!-- 商品5：矿泉水 -->
                <div class="product-card">
                    <div class="product-image">
                        <img src="矿泉水.png" alt="矿泉水">
                    </div>
                    <div class="product-info">
                        <h3>天然矿泉水</h3>
                        <p class="product-desc">弱碱性水，健康饮水</p>
                        <div class="price-row">
                            <span class="price">¥2.50</span>
                            <button class="add-btn" onclick="addToCart(5)">加入购物车</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 购物车区 -->
    <section id="cart" class="cart-section">
        <div class="container">
            <h2 class="section-title">我的购物车</h2>
            <div class="cart-container">
                <div class="cart-items" id="cart-items">
                    <p class="empty-cart">您的购物车还是空的，快去挑选商品吧~</p>
                </div>
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>商品总计：</span>
                        <span id="subtotal">¥0.00</span>
                    </div>
                    <div class="summary-row total-row">
                        <span>应付金额：</span>
                        <span id="total" class="total-price">¥0.00</span>
                    </div>
                    <div class="cart-buttons">
                        <button class="btn-clear" onclick="clearCart()">清空购物车</button>
                        <button class="btn-checkout" onclick="checkout()">立即结算</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 FreshMart 生鲜超市 | 仅供实验使用</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
