<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart Admin - Visitor Browse Log</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            margin: 30px auto;
        }
        h1 {
            color: #232f3e;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #232f3e;
            color: #fff;
        }
        .empty-text {
            padding: 40px;
            background: #f5f5f5;
            text-align: center;
            font-size: 18px;
            color: #666;
        }
        .back-shop {
            display: inline-block;
            padding: 10px 18px;
            background: #ff9900;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .clear-all {
            padding: 10px 18px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-shop">← Back to Shopping Page</a>
        <h1>Visitor Browse Duration Record (Admin Only)</h1>
        <button id="clearBtn" class="clear-all">Clear All Records</button>
        <table>
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Entry Time</th>
                    <th>Leave Time</th>
                    <th>Total Browse Time</th>
                </tr>
            </thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>

    <script>
        const logBody = document.getElementById('logBody');
        const allLogs = JSON.parse(localStorage.getItem('freshmartVisitLogs')) || [];

        if(allLogs.length === 0) {
            logBody.innerHTML = `<tr><td colspan="4" class="empty-text">No visitor data yet, open index.html to generate logs</td></tr>`;
        } else {
            allLogs.forEach((item, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td>${item.enter}</td>
                    <td>${item.leave}</td>
                    <td>${item.showTime}</td>
                `;
                logBody.appendChild(tr);
            })
        }

        document.getElementById('clearBtn').addEventListener('click', () => {
            if(confirm("Delete all visitor records permanently?")){
                localStorage.removeItem('freshmartVisitLogs');
                location.reload();
            }
        })
    </script>
</body>
</html>
