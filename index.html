<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>在线杂货购物实验系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>在线杂货购物实验场景</h1>
</header>

<div class="container">
    <div class="main-content">

        <!-- 左侧商品区 -->
        <div class="box">
            <h2>商品列表</h2>

            <div class="product-row">
                <span>苹果 ￥5.99</span>
                <button class="add" onclick="add(1)">加入购物车</button>
            </div>
            <div class="product-row">
                <span>牛奶 ￥12.50</span>
                <button class="add" onclick="add(2)">加入购物车</button>
            </div>
            <div class="product-row">
                <span>面包 ￥8.99</span>
                <button class="add" onclick="add(3)">加入购物车</button>
            </div>
            <div class="product-row">
                <span>鸡蛋 ￥15.00</span>
                <button class="add" onclick="add(4)">加入购物车</button>
            </div>
            <div class="product-row">
                <span>矿泉水 ￥2.50</span>
                <button class="add" onclick="add(5)">加入购物车</button>
            </div>
        </div>

        <!-- 右侧购物车 -->
        <div class="box">
            <h2>购物车</h2>
            <div id="cart-list"></div>

            <div class="total">总计：￥<span id="total">0.00</span></div>

            <div class="button-group">
                <button class="danger" onclick="clearCart()">清空购物车</button>
                <button class="primary" onclick="checkout()">结算</button>
            </div>
        </div>

    </div>
</div>

<!-- 引入我们新建的script.js -->
<script src="script.js"></script>

</body>
</html>
